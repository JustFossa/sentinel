name: Feature request
description: Suggest a new agent, tool, or scenario for Sentinel
title: "[feat]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: e.g. a new investigator, an MCP tool, or a new incident scenario
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - New agent / reasoning step
        - New MCP tool / data source
        - New scenario
        - Observability / tracing
        - Docs
        - Other
